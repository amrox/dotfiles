# tmux.conf — regular tmux (not -CC mode)
# For iTerm2 control mode, see ~/.tmux-cc.conf

# Prefix
unbind C-b
set -g prefix C-Space

# Mouse support
set -g mouse on

set -g window-size latest
 
# vi keys in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
 
# Status bar
set -g status-bg black
set -g status-fg green
set -g status-right "#{tmux_mode_indicator}"
 
# Window numbering starts at 1 to match keyboard
set -g base-index 1
set -g pane-base-index 1
setw -g automatic-rename
 

# Extended keys: lets Claude Code (and other CSI u apps) see Shift+Enter
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Synchronized output: reduces TUI flicker (e.g. Claude Code in tmux)
# Requires tmux 3.4+ and app support for DECSET 2026
set -as terminal-features ',xterm*:sync'

# Mode indicator plugin config
# defaults are TMUX WAIT COPY
set -g @mode_indicator_empty_prompt ' NORMAL '
set -g @mode_indicator_prefix_prompt ' PREFIX '
set -g @mode_indicator_copy_prompt ' COPY '
set -g @mode_indicator_sync_prompt ' SYNC '
 
# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
 
# Initialize plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
 
# Non-login shell — avoid re-running login scripts
set -g default-command "exec $SHELL"
