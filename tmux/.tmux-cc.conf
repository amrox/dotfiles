# tmux-cc.conf — standalone config for iTerm2 control mode (-CC)
# et -c "env -u TMUX tmux -CC -f ~/.tmux-cc.conf new -A -s main" zmey
 
# Window numbering starts at 1 to match keyboard
set -g base-index 1
 
# iTerm2 translates native mouse actions into tmux commands
set -g mouse on
 
# Focus events cause bells in -CC mode
set -g focus-events off
 
# Suppress any remaining bells
set -g bell-action none
 
# Let programs set window/tab names via escape sequences
set -g allow-rename on
 
# Forward window titles to iTerm2 tabs
set -g set-titles on
set -g set-titles-string '#T'
 
# Correct TERM so iTerm2 doesn't do screen->xterm translation
set -g default-terminal "xterm-256color"
 
# Let iTerm2 handle window sizing, not tmux
setw -g aggressive-resize off
 
# Non-login shell — avoid re-running login scripts
set -g default-command "exec $SHELL"
